# Read the documentation at https://github.com/thephpleague/flysystem-bundle/blob/master/docs/1-getting-started.md
flysystem:
    storages:
        faces.storage:
            adapter: 'local'
            options:
                directory: '%kernel.project_dir%/public/uploads/faces'
            public_url_generator: App\Service\File\FlysystemPublicUrlGenerator
